# Render Blueprint - Crypto Sentiment (no AWS required)
# Deploy: push to GitHub, then Render Dashboard → New + → Blueprint → Connect repo → Apply
# Data populates from news RSS feeds on startup and every 2 hours.

databases:
  - name: crypto-sentiment-db
    plan: free
    region: ohio
    databaseName: crypto_sentiment

services:
  # Backend (Java Spring Boot) - Docker build (free tier: spins down after 15 min idle)
  - type: web
    name: crypto-backend
    runtime: docker
    plan: free
    region: ohio
    rootDir: crypto-sentiment/backend/crypto-backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: crypto-sentiment-db
          property: connectionString

  # Frontend (React static site)
  - type: web
    name: crypto-frontend
    runtime: static
    rootDir: crypto-sentiment/frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: build
    envVars:
      # Set in Dashboard after deploy: https://crypto-backend.onrender.com/api (or your backend URL)
      - key: REACT_APP_API_URL
        sync: false
