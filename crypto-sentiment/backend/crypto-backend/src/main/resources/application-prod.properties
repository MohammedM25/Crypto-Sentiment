server.port=${PORT:5000}
server.address=0.0.0.0

# Database: use DATABASE_URL (Render) when set, otherwise RDS_* vars
spring.datasource.url=jdbc:postgresql://${RDS_HOSTNAME:localhost}:${RDS_PORT:5432}/${RDS_DB_NAME:crypto_sentiment}?connectTimeout=10&socketTimeout=30&sslmode=disable
spring.datasource.username=${RDS_USERNAME:postgres}
spring.datasource.password=${RDS_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

spring.redis.host=${REDIS_HOSTNAME:}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.timeout=2000ms

cors.allowed-origins=https://cryptosentiment.it.com,https://www.cryptosentiment.it.com,http://localhost:3000,https://frontend-gxbcqik8g-mohammedmohammed1025s-projects.vercel.app,https://*.vercel.app,https://crypto-frontend.onrender.com,https://*.onrender.com

trend.controller.enabled=true
trend.service.enabled=true
market.controller.enabled=true

