server.port=${PORT:5000}
server.address=0.0.0.0

spring.datasource.url=jdbc:postgresql://${RDS_HOSTNAME}:${RDS_PORT}/${RDS_DB_NAME}?connectTimeout=10&socketTimeout=30
spring.datasource.username=${RDS_USERNAME}
spring.datasource.password=${RDS_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

spring.redis.host=${REDIS_HOSTNAME:}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.timeout=2000ms

cors.allowed-origins=https://cryptosentiment.it.com,https://www.cryptosentiment.it.com,http://localhost:3000,http://cryptosent.us-east-2.elasticbeanstalk.com,https://frontend-gxbcqik8g-mohammedmohammed1025s-projects.vercel.app,https://*.vercel.app,https://crypto-frontend.onrender.com,https://*.onrender.com

trend.controller.enabled=true
trend.service.enabled=true
sentiment.processor.enabled=true
market.controller.enabled=true

aws.region=us-east-2
aws.sqs.processing-queue-url=https://sqs.us-east-2.amazonaws.com/203129030113/crypto-sentiment-processing-queue
aws.s3.bucket-name=crypto-sentiment-data-mohammed-2025

